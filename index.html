<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Détection Tournée</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
<style>
body { font-family: Arial; background:#111; color:#fff; padding:20px; }
.box { max-width:720px; margin:auto; position:relative; }
input { width:100%; padding:15px; font-size:18px; border-radius:8px; border:none; }
button { width:100%; padding:15px; margin-top:10px; font-size:18px; border-radius:8px; border:none; background:#00c853; color:#fff; }
#result { margin-top:15px; padding:15px; background:#222; border-radius:10px; }

video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 1000;
}

#scanZone {
  position: fixed;
  top: 18%;
  left: 8%;
  width: 84%;
  height: 28%;
  border: 4px solid #00ff00;
  border-radius: 14px;
  display: none;
  z-index: 9999;
  box-sizing: border-box;
  pointer-events: none;
}

#infoMessage {
  position: fixed;
  top: 20px;
  left: 0;
  width: 100%;
  text-align: center;
  z-index: 10000;
  font-size: 18px;
  font-weight: bold;
}
</style>
</style>
</head>

<body>

<div id="infoMessage"></div>
<div id="scanZone"></div>

<div class="box">
<h1>Scan / Saisie Adresse</h1>
<input id="address" placeholder="Ex : 15 rue des Arceaux Montpellier">
<button onclick="startScan()">📸 Scanner l'adresse</button>
<div id="result">En attente d'une adresse.</div>
</div>

<script>

async function startScan() {

const video = document.createElement("video");
video.setAttribute("autoplay", true);

const stream = await navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
});

video.srcObject = stream;
document.body.appendChild(video);

document.querySelector(".box").style.display = "none";
document.getElementById("scanZone").style.display = "block";

const info = document.getElementById("infoMessage");
info.innerText = "📸 Cadre l'adresse - capture dans 3 secondes";

setTimeout(async () => {

info.innerText = "🔍 Analyse...";

const canvas = document.createElement("canvas");
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

const ctx = canvas.getContext("2d");
ctx.filter = "grayscale(100%) contrast(200%)";
ctx.drawImage(video, 0, 0);

stream.getTracks().forEach(track => track.stop());
video.remove();

document.querySelector(".box").style.display = "block";
document.getElementById("scanZone").style.display = "none";

const image = canvas.toDataURL("image/png");

const result = await Tesseract.recognize(image, "fra");

const raw = result.data.text.toUpperCase().split("\n");

let address = "";

for (let i = 0; i < raw.length; i++) {
  if (/\d{5}/.test(raw[i])) {
    const cpVille = raw[i];
    const rue = raw[i-1] || "";
    address = rue + " " + cpVille;
    break;
  }
}

if (!address) address = raw.join(" ");

document.getElementById("address").value = address;
document.getElementById("result").innerText = address;

info.innerText = "";

}, 3000);

}

</script>

</body>
</html>
