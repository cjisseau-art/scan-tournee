<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Détection Tournée</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:20px; background:#111; color:#fff; }
    .box { max-width:720px; margin:auto; position:relative; z-index:5; }
    h1 { font-size:24px; }
    input { width:100%; box-sizing:border-box; padding:16px; font-size:18px; border-radius:8px; border:0; margin:12px 0; }
    button { width:100%; padding:16px; font-size:18px; border-radius:8px; border:0; background:#00c853; color:#fff; font-weight:bold; cursor:pointer; margin-top:10px; }
    #result { margin-top:18px; padding:18px; border-radius:10px; background:#222; color:#fff; font-size:20px; line-height:1.5; min-height:50px; }
    .ok { background:#103d20 !important; }
    .err { background:#4a1515 !important; }
    .small { font-size:13px; opacity:.75; margin-top:12px; }
    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 0%;
      z-index: 1;
    }
    #scanZone {
      display:none;
      position: fixed;
      top: 15%;
      left: 8%;
      width: 84%;
      height: 28%;
      border: 3px solid #00ff00;
      border-radius: 12px;
      z-index: 2;
      box-sizing: border-box;
      pointer-events:none;
    }
    #infoMessage {
      display:none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 10px 18px;
      border-radius: 20px;
      font-size: 16px;
      z-index: 3;
      text-align:center;
      max-width: 86%;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div id="scanZone"></div>
  <div class="box">
    <h1>Scan / Saisie Adresse</h1>
    <input id="address" placeholder="Ex : 15 rue des Arceaux Montpellier" />
    <button onclick="startScan()">📸 Scanner l'adresse</button>
    <div id="result">En attente d'une adresse.</div>
    <div class="small">Conseil : si besoin, complète avec la commune. Le système ajoute aussi “Hérault France”.</div>
  </div>

function normalizeText(s) {
  return String(s || "").replace(/ /g, " ").trim();
}

function extractTourneeSecteur(name) {
  const clean = normalizeText(name);
  const match = clean.match(/^(P\d+(?:\/P\d+)?)\s*(.*)$/i);
  if (match) {
    return { tournee: match[1].toUpperCase(), secteur: match[2].trim() || clean };
  }
  return { tournee: clean.split(/\s+/)[0] || "?", secteur: clean };
}

async function getCoords(address) {
  if (!GOOGLE_API_KEY || GOOGLE_API_KEY === "COLLE_TA_CLE_ICI") {
    throw new Error("Clé Google Maps non renseignée dans le fichier HTML.");
  }
  const finalAddress = address + " Hérault France";
  const url = `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(finalAddress)}&key=${GOOGLE_API_KEY}`;
  const res = await fetch(url);
  const data = await res.json();
  if (data.status !== "OK" || !data.results || !data.results[0]) {
    throw new Error("Géocodage impossible : " + (data.error_message || data.status || "erreur inconnue"));
  }
  const loc = data.results[0].geometry.location;
  return [loc.lng, loc.lat];
}

function pointInRing(point, ring) {
  let x = point[0], y = point[1];
  let inside = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const xi = ring[i][0], yi = ring[i][1];
    const xj = ring[j][0], yj = ring[j][1];
    const intersect = ((yi > y) !== (yj > y)) &&
      (x < (xj - xi) * (y - yi) / ((yj - yi) || 1e-12) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

function pointInPolygonWithHoles(point, polygon) {
  if (!polygon || !polygon[0]) return false;
  if (!pointInRing(point, polygon[0])) return false;
  for (let i = 1; i < polygon.length; i++) {
    if (pointInRing(point, polygon[i])) return false;
  }
  return true;
}

function featureContainsPoint(feature, point) {
  const geom = feature.geometry;
  if (!geom) return false;
  if (geom.type === "Polygon") return pointInPolygonWithHoles(point, geom.coordinates);
  if (geom.type === "MultiPolygon") return geom.coordinates.some(poly => pointInPolygonWithHoles(point, poly));
  return false;
}

async function findTour() {
  const address = document.getElementById("address").value.trim();
  const result = document.getElementById("result");
  result.className = "";
  if (!address) {
    result.className = "err";
    result.innerHTML = "❌ Saisis ou scanne une adresse.";
    return;
  }
  result.innerHTML = "Recherche de l'adresse...";
  try {
    const point = await getCoords(address);
    for (const feature of zones.features) {
      if (featureContainsPoint(feature, point)) {
        const props = feature.properties || {};
        const label = props.name || props.description || "Secteur inconnu";
        const info = extractTourneeSecteur(label);
        const color = props.fill || "#00c853";
        result.className = "ok";
        result.innerHTML = `
          <div style="background:${color}; color:#fff; padding:20px; border-radius:15px; font-size:28px; font-weight:bold; text-align:center;">
            🚚 TOURNÉE : ${info.tournee}<br>
            📍 SECTEUR : ${info.secteur}
          </div>`;
        return;
      }
    }
    result.className = "err";
    result.innerHTML = "❌ Adresse géocodée, mais aucun secteur trouvé dans le GeoJSON.";
  } catch (e) {
    result.className = "err";
    result.innerHTML = "❌ " + e.message;
  }
}


function cleanOcrText(raw) {
  return (raw || "")
    .toUpperCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[|]/g, "I")
    .replace(/\s+/g, " ")
    .trim();
}

function extractAddressFromOcr(rawText) {
  const rawLines = (rawText || "")
    .toUpperCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .split(/\n+/)
    .map(l => l.replace(/[^0-9A-Z'\-\s]/g, " ").replace(/\s+/g, " ").trim())
    .filter(Boolean);

  const isNoise = (line) =>
    /SHIP|TO:|TRACKING|UPS|STANDARD|EXPRESS|FRANCE$|FRA|KG|DATE|SHP|BILLING|REF|EDI|PHONE|GERMANY|NETHERLANDS|POLAND/.test(line) ||
    /^\d{8,}$/.test(line.replace(/\s/g, ""));

  const postalIndex = rawLines.findIndex(line => /\b\d{5}\s+[A-Z][A-Z\s\-']{2,}/.test(line));

  if (postalIndex !== -1) {
    const cpVilleMatch = rawLines[postalIndex].match(/\b(\d{5}\s+[A-Z][A-Z\s\-']{2,})/);
    const cpVille = cpVilleMatch ? cpVilleMatch[1].trim() : rawLines[postalIndex];

    const streetKeywords = /\b(RUE|AVENUE|AV|BD|BOULEVARD|CHEMIN|IMPASSE|PLACE|PL|ROUTE|ALLEE|VOIE|PARC|QUAI|COURS|LOT|ZA|ZAC|RESIDENCE|ROND POINT|PASSAGE)\b/;
    const candidates = rawLines.slice(Math.max(0, postalIndex - 6), postalIndex)
      .filter(line => line.length > 3 && !isNoise(line));

    let best = "";
    let bestScore = -999;
    for (const line of candidates) {
      let score = 0;
      if (streetKeywords.test(line)) score += 8;
      if (/\d/.test(line)) score += 3;
      if (line.length >= 8 && line.length <= 55) score += 2;
      if (/\b(MME|MR|MONSIEUR|MADAME|SARL|SAS|SOCIETE|RECEPTION|DESK)\b/.test(line)) score -= 2;
      if (/\d{8,}/.test(line.replace(/\s/g, ""))) score -= 6;
      if (score > bestScore) { bestScore = score; best = line; }
    }

    const address = best ? `${best} ${cpVille}` : cpVille;
    return address.replace(/\s+/g, " ").trim();
  }

  return cleanOcrText(rawText);
}

function cropScanZoneFromVideo(video, scanZone) {
  const videoRect = video.getBoundingClientRect();
  const zoneRect = scanZone.getBoundingClientRect();

  const scale = Math.max(videoRect.width / video.videoWidth, videoRect.height / video.videoHeight);
  const renderedW = video.videoWidth * scale;
  const renderedH = video.videoHeight * scale;
  const offsetX = (videoRect.width - renderedW) / 2;
  const offsetY = 0; // object-position: center 0%

  let sx = (zoneRect.left - videoRect.left - offsetX) / scale;
  let sy = (zoneRect.top - videoRect.top - offsetY) / scale;
  let sw = zoneRect.width / scale;
  let sh = zoneRect.height / scale;

  sx = Math.max(0, sx);
  sy = Math.max(0, sy);
  sw = Math.min(video.videoWidth - sx, sw);
  sh = Math.min(video.videoHeight - sy, sh);

  const canvas = document.createElement("canvas");
  canvas.width = Math.max(1, Math.round(sw * 2));
  canvas.height = Math.max(1, Math.round(sh * 2));
  const ctx = canvas.getContext("2d");
  ctx.filter = "grayscale(100%) contrast(220%) brightness(115%)";
  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
  return canvas;
}

async function startScan() {
  const scanZone = document.getElementById("scanZone");
  const infoMessage = document.getElementById("infoMessage");
  const resultBox = document.getElementById("result");
  const box = document.querySelector(".box");

  try {
    resultBox.className = "";
    resultBox.innerHTML = "Ouverture caméra...";

    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" } },
      audio: false
    });

    const video = document.createElement("video");
    video.srcObject = stream;
    video.setAttribute("playsinline", true);
    video.muted = true;
    document.body.appendChild(video);
    await video.play();

    box.style.display = "none";
    scanZone.style.display = "block";
    infoMessage.style.display = "block";
    infoMessage.innerText = "📸 Cadre l'adresse dans le rectangle vert";

    setTimeout(async () => {
      const canvas = cropScanZoneFromVideo(video, scanZone);

      stream.getTracks().forEach(track => track.stop());
      video.remove();
      scanZone.style.display = "none";
      infoMessage.innerText = "🔍 Lecture de l'adresse...";
      box.style.display = "block";

      const imageData = canvas.toDataURL("image/png");
      const ocr = await Tesseract.recognize(imageData, "fra", {
        tessedit_pageseg_mode: "6"
      });

      const raw = (ocr.data.text || "").trim();
      const extractedAddress = extractAddressFromOcr(raw);

      document.getElementById("address").value = extractedAddress;
      infoMessage.style.display = "none";
      findTour();
    }, 3000);
  } catch (err) {
    scanZone.style.display = "none";
    infoMessage.style.display = "none";
    if (box) box.style.display = "block";
    alert("Erreur caméra : " + err.message);
  }
}

// Validation manuelle rapide si besoin : touche Entrée dans le champ adresse
const addressInput = document.getElementById("address");
if (addressInput) {
  addressInput.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
      findTour();
    }
  });
}
